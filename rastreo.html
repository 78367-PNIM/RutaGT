<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rastreo de Envío</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Rastreo de Envío</h2>

<input id="codigo" placeholder="Código de envío">
<button onclick="rastrear()">Rastrear</button>

<pre id="resultado"></pre>

<script>
function rastrear() {
  fetch("http://localhost:5000/rastreo/" + document.getElementById("codigo").value)
    .then(res => res.json())
    .then(data => {
      document.getElementById("resultado").innerText =
        JSON.stringify(data, null, 2);
    });
}
</script>

</body>
</html>
